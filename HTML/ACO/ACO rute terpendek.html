<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>ACO Graf Planar</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.js"></script>
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Mencegah scrollbar yang tidak perlu */
            font-family: sans-serif;
            display: flex; /* Mengaktifkan layout Flexbox */
        }
        
        /* Gaya untuk Panel Menu Kiri */
        #menu-panel {
            width: 300px;
            height: 100vh; 
            background: #1c1c1c;
            color: white;
            padding: 15px;
            box-sizing: border-box;
            overflow-y: auto; /* Memungkinkan scroll jika menu panjang */
            flex-shrink: 0; /* Pastikan panel tidak menyusut */
        }

        /* Gaya untuk Konten Kanvas Kanan */
        #maze-panel {
            flex: 1; /* Mengisi sisa ruang */
            height: 100vh;
            position: relative;
        }

        /* Gaya untuk P5.js UI elements */
        .slider-container { margin-bottom: 15px; }
        .label-container { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; }
        input[type=range] { width: 100%; }
        button {
            width: 100%; padding: 10px; margin-top: 10px; 
            background-color: #007bff; color: white; border: none; 
            border-radius: 4px; cursor: pointer; font-size: 15px; font-weight: bold;
        }
    </style>
</head>

<body>
    <div id="menu-panel">
        <h3>Kontrol ACO Graf</h3>
        <div id="ui-sliders">
            </div>
    </div>

    <div id="maze-panel">
        <main></main>
    </div>

    <script src="./aco_graf.js"></script>
</body>
</html>
